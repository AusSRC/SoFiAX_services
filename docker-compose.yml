services:
  survey_web:
    image: survey_web
    container_name: survey_web
    build:
      context: web
    ports:
      - 8000:8000
    volumes:
      - ./web:/opt/services/survey_web/src
      - static_volume:/opt/services/survey_web/src/static
      - media_volume:/opt/services/survey_web/src/media
    networks:
      - survey_network

  survey_nginx:
    image: nginx:latest
    container_name: chad_nginx
    build:
      context: nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs/www:/var/www/certbot
      - ./nginx/certs/letsencrypt:/etc/letsencrypt
      - ./nginx/logs:/var/log/nginx
      - static_volume:/opt/services/survey_web/src/static
      - media_volume:/opt/services/survey_web/src/media
    depends_on:
      - survey_web
    networks:
      - survey_network

  survey_certbot:
    image: certbot/certbot:latest
    container_name: survey_certbot
    volumes:
      - ./nginx/certs/www:/var/www/certbot
      - ./nginx/certs/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - survey_network

  survey_vo:
    image: aussrc/survey_vo
    container_name: survey_vo
    build:
      context: vo
    env_file:
      - vo/vo.env
    volumes:
      - /var/gavo/state:/var/gavo/state
      - /var/gavo/cache:/var/gavo/cache
      - /var/gavo/tmp:/var/gavo/tmp
    ports:
      - 8080:8080
    depends_on:
      - survey_web
    networks:
      - survey_network

networks:
  survey_network:
    external: true
    name: survey_network

volumes:
  static_volume:
  media_volume:
